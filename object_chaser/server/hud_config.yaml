# HUD overlay configuration for video composer

hud:
  # Position: bottom-center
  position: center      # "center" or "left"
  margin_y: 40

  # Overall opacity of the HUD background panel
  panel_alpha: 0.4

  # Color scheme (BGR)
  color_primary: [200, 220, 200]     # light cyan-green
  color_accent: [120, 255, 200]      # bright green
  color_dim: [100, 120, 100]         # dim green for inactive
  color_bg: [15, 20, 15]             # near-black green tint
  color_negative: [80, 80, 200]      # red-ish for reverse

  track:
    width: 42
    height: 135
    corner_radius: 12
    # Speed lines
    max_lines: 4
    line_thickness: 1
    # Normalization range: maps this speed range to 0-100% of the indicator
    speed_min: 0.02
    speed_max: 0.10

  servo:
    radius: 75
    needle_length: 63
    arc_thickness: 1
    needle_thickness: 2
    tick_length: 12

  # Depth mesh overlay on detected objects
  mesh:
    fill_alpha_min: 0.0    # fill opacity for farthest triangles
    fill_alpha_max: 0.0    # fill opacity for nearest triangles
    darken: 1.0            # background darkening behind mesh (0=black, 1=none)
    gamma: 2.0              # depth curve: >1 = more contrast on near, 1 = linear
    cutoff: 0.0               # skip triangles with closeness below this (0 = show all)
    max_triangle_area: 1500   # skip triangles larger than this (pixels², 0 = no limit)
    depth_pct_near: 25      # percentile for near boundary (lower = wider range)
    depth_pct_far: 75       # percentile for far boundary (higher = wider range)
    # Wireframe color gradient (BGR): far → mid → near
    color_far: [30, 80, 30]       # dark green
    color_mid: [50, 170, 50]      # medium green
    color_near: [100, 255, 120]   # light green

  # Debug: show source filenames/timestamps in bottom-left
  debug_sources: true

  # Log lines overlay: show most recent log line per source at top-left
  # Each name maps to <session>/logs/<name>.log
  log_sources:
    - body_follow
    - servo
    - yolo

  # Spacing between elements
  gap: 30

  # Font
  font_scale: 0.55
  font_thickness: 1
