# Chase targets for rover body_follow.
# Priority 0 = highest. When multiple targets are visible the rover follows
# the highest-priority group; within that group it picks highest confidence.
# confidence: per-target minimum detection confidence (0.0–1.0).

targets:
  - name: cat
    priority: 0
    confidence: 0.8
  - name: dog
    priority: 1
    confidence: 0.8
  - name: person
    priority: 2
    confidence: 0.8
